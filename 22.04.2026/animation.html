<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        .main {
            width: 100%;
            height: 100vh;
            background-color: azure;

            animation-name: shoxruzbek;
            animation-delay: 0s;
            animation-duration: 4s;
            animation-iteration-count: infinite;
        }
        p {
            color: rgb(4, 89, 89);
        }

        @keyframes shoxruzbek {
            25% {
                background-color: red;
                color: snow;
            }
            50% {
                background-color: blue;
                color: green;
            }
            75% {
                background-color: antiquewhite;
                color: black;
            }
            100% {
                background-color: aquamarine;
                color: magenta;
            }
        }


    </style>
  </head>
  <body>
    <div class="main">
        <h1>Bosh sahifa</h1>
        <p>LOREM</p>
    </div>
  </body>
</html>
